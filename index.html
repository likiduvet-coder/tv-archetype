<!DOCTYPE html>
<html lang="en">
  <!-- added a space here -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Archetype Personality Quiz</title>
<style>
/* ====== CSS ====== */
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
  padding: 20px;
  color: #333;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

#quiz {
  max-width: 800px;
  margin: 0 auto 20px auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
}

.question {
  margin-bottom: 15px;
}

.question p {
  font-weight: bold;
  margin-bottom: 8px;
}

label {
  display: block;
  margin-bottom: 4px;
  cursor: pointer;
}

button#submitBtn {
  display: block;
  margin: 20px auto;
  padding: 12px 30px;
  background-color: #0077cc;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button#submitBtn:hover {
  background-color: #005fa3;
}

#result {
  max-width: 800px;
  margin: 0 auto;
  background: #e6f2ff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0px 4px 8px rgba(0,0,0,0.05);
}

#result h2 {
  text-align: center;
  margin-bottom: 15px;
}

#result p {
  margin-bottom: 12px;
}

#result strong {
  color: #0077cc;
}

/* Optional debug styling */
#debug {
  max-width: 800px;
  margin: 20px auto;
  padding: 10px;
  background: #f0f0f0;
  border-radius: 8px;
  font-family: monospace;
  display: none;
}
</style>
</head>
<body>

<h1>TV Archetype Personality Quiz</h1>
<div id="quiz"></div>
<button id="submitBtn">Submit</button>
<div id="result"></div>
<div id="debug"></div>

<script>
/* ====== JavaScript ====== */

// Questions
const questions = [
  // INNER VOICE
  { q: "I usually understand what I think only after I’ve talked it through.", typeA: "Tootie", typeB: "Natalie" },
  { q: "When something happens, I tend to act on it before fully thinking it through.", typeA: "Jo", typeB: "Natalie" },
  { q: "I prefer to decide quickly and move forward, even if I don’t have all the information.", typeA: "Blair", typeB: "Natalie" },
  { q: "I’d rather figure things out my own way than follow a clear or established approach.", typeA: "Jo", typeB: "Blair" },
  { q: "My reactions are usually visible to others as I’m experiencing them.", typeA: "Tootie", typeB: "Natalie" },
  { q: "I tend to form a clear perspective internally before sharing it with others.", typeA: "Natalie", typeB: "Tootie" },
  { q: "I naturally take the lead in shaping how situations unfold.", typeA: "Blair", typeB: "Jo" },

  // SOCIAL STYLE
  { q: "I naturally focus on making people feel comfortable in conversations.", typeA: "Charlene", typeB: "Suzanne" },
  { q: "I think carefully about how I phrase things before I speak.", typeA: "Julia", typeB: "Mary Jo" },
  { q: "I naturally pick up on how others are feeling and adjust my approach in the moment.", typeA: "Mary Jo", typeB: "Suzanne" },
  { q: "I tend to speak in a relaxed, unfiltered way rather than refining what I say.", typeA: "Mary Jo", typeB: "Julia" },
  { q: "I prioritize being emotionally present over being precise in conversations.", typeA: "Charlene", typeB: "Julia" },
  { q: "I intentionally shape how I present myself to create a specific impression.", typeA: "Suzanne", typeB: "Charlene" },
  { q: "I aim to express myself clearly, even if it takes more time or effort.", typeA: "Julia", typeB: "Mary Jo" },

  // JUDGMENT STYLE
  { q: "I focus more on whether something makes sense than how it feels.", typeA: "Dorothy", typeB: "Blanche" },
  { q: "I take what people say at face value unless contradicted.", typeA: "Rose", typeB: "Sophia" },
  { q: "I rely on emotional reactions to understand meaning.", typeA: "Blanche", typeB: "Dorothy" },
  { q: "I quickly form a blunt view of what’s really going on.", typeA: "Sophia", typeB: "Rose" },
  { q: "I try to reconcile inconsistencies before concluding.", typeA: "Dorothy", typeB: "Sophia" },
  { q: "I’m comfortable accepting things without questioning deeply.", typeA: "Rose", typeB: "Dorothy" },
  { q: "I prioritize emotional nuance over blunt conclusions.", typeA: "Blanche", typeB: "Sophia" },

  // LIFE ORIENTATION
  { q: "I tend to prioritise maintaining harmony in my relationships, even if it slows other progress.", typeA: "Melanie", typeB: "Elka" },
  { q: "I usually pursue experiences that excite me, even if they are unpredictable or inconvenient.", typeA: "Joy", typeB: "Melanie" },
  { q: "I often make decisions based on what I hope will make the biggest positive impression.", typeA: "Victoria", typeB: "Elka" },
  { q: "I prefer practical solutions that work reliably over idealistic approaches.", typeA: "Elka", typeB: "Victoria" },
  { q: "I value spontaneity and trying new things over following a consistent routine.", typeA: "Joy", typeB: "Melanie" },
  { q: "I carefully consider long-term outcomes and how my choices affect my legacy.", typeA: "Victoria", typeB: "Joy" },
  { q: "I focus on what is achievable right now rather than what could be ideal in the future.", typeA: "Elka", typeB: "Melanie" }
];

// Likert scale
const likert = [
  { text: "Strongly Agree", valueA: 2, valueB: 0 },
  { text: "Agree", valueA: 1, valueB: 0 },
  { text: "Neutral", valueA: 0.5, valueB: 0.5 },
  { text: "Disagree", valueA: 0, valueB: 1 },
  { text: "Strongly Disagree", valueA: 0, valueB: 2 }
];

// Blurbs for summaries
const blurbs = {
  "Natalie": "You process internally, thinking deeply before sharing. Reflection and contemplation guide your decisions.",
  "Blair": "You are decisive and self-directed, confident in making choices quickly.",
  "Jo": "You act first and figure things out as you go, preferring autonomy over following rules.",
  "Tootie": "You express thoughts as you have them, often processing ideas out loud.",
  "Charlene": "Warm and caring, you naturally focus on others’ comfort and emotional well-being.",
  "Julia": "Precise and articulate, you value clarity and carefully choose your words.",
  "Suzanne": "Intentional in self-presentation, you are aware of the impression you create.",
  "Mary Jo": "Socially attuned, you pick up cues from others and adapt your behaviour naturally.",
  "Dorothy": "Logical and analytical, you rely on reason and evidence to draw conclusions.",
  "Blanche": "Emotionally intuitive, you interpret situations through feelings and nuance.",
  "Rose": "Trusting and literal, you often take people at face value.",
  "Sophia": "Bluntly realistic, you cut through fluff and focus on what’s really happening.",
  "Melanie": "Relational and harmony-focused, you prioritise stable connections and continuity.",
  "Victoria": "Idealistic and image-conscious, you often consider long-term ideals and presentation.",
  "Joy": "Experiential and spontaneous, you seek excitement and variety in life.",
  "Elka": "Practical and realistic, you focus on achievable solutions and blunt truths."
};

// Dimensions
const dimensions = {
  "Inner Voice": ["Natalie","Blair","Jo","Tootie"],
  "Social Style": ["Charlene","Julia","Suzanne","Mary Jo"],
  "Judgment Style": ["Dorothy","Blanche","Rose","Sophia"],
  "Life Orientation": ["Melanie","Victoria","Joy","Elka"]
};

// Render quiz
const quizDiv = document.getElementById("quiz");
questions.forEach((q, idx) => {
  const qDiv = document.createElement("div");
  qDiv.className = "question";
  qDiv.innerHTML = `<p>${idx + 1}. ${q.q}</p>`;
  likert.forEach(opt => {
    const label = document.createElement("label");
    const radio = document.createElement("input");
    radio.type = "radio";
    radio.name = `q${idx}`;
    radio.dataset.valueA = opt.valueA;
    radio.dataset.valueB = opt.valueB;
    label.appendChild(radio);
    label.appendChild(document.createTextNode(` ${opt.text}`));
    qDiv.appendChild(label);
  });
  quizDiv.appendChild(qDiv);
});

// Submit button
document.getElementById("submitBtn").addEventListener("click", () => {
  const scores = {};
  questions.forEach(q => { scores[q.typeA] = 0; scores[q.typeB] = 0; });

  questions.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    if (!selected) return;
    scores[q.typeA] += parseFloat(selected.dataset.valueA);
    scores[q.typeB] += parseFloat(selected.dataset.valueB);
  });

  // Final type per dimension
  const finalTypes = {};
  for (const [dim, types] of Object.entries(dimensions)) {
    let topType = types[0], topScore = scores[topType];
    types.forEach(t => { if (scores[t] > topScore) { topScore = scores[t]; topType = t; } });
    finalTypes[dim] = topType;
  }

  // Overall dominant persona
  let dominant = null, highestScore = 0;
  for (const [dim, types] of Object.entries(dimensions)) {
    types.forEach(t => { if (scores[t] > highestScore) { highestScore = scores[t]; dominant = t; } });
  }

  // Build summary
  let summaryText = `<p><strong>Your dominant style is: ${dominant}</strong></p>`;
  summaryText += `<p>${blurbs[finalTypes["Inner Voice"]]}</p>`;
  summaryText += `<p>${blurbs[finalTypes["Social Style"]]}</p>`;
  summaryText += `<p>${blurbs[finalTypes["Judgment Style"]]}</p>`;
  summaryText += `<p>${blurbs[finalTypes["Life Orientation"]]}</p>`;

  document.getElementById("result").innerHTML = `<h2>Your TV Archetype Personality:</h2>
    <p>${finalTypes["Inner Voice"]} – ${finalTypes["Social Style"]} – ${finalTypes["Judgment Style"]} – ${finalTypes["Life Orientation"]}</p>` + summaryText;

  document.getElementById("debug").innerHTML = `<pre>${JSON.stringify(scores, null, 2)}</pre>`;
});
</script>

</body>
</html>
